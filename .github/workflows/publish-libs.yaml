name: Publish NPM Libraries

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-libs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Version and publish libraries
    runs-on: ubuntu-latest

    steps:
      - name: Ensure this workflow runs from main
        if: github.ref_name != 'main'
        run: |
          echo "This workflow must be dispatched from the main branch."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: v0.13.1

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Ensure release plans exist
        run: |
          shopt -s nullglob
          plans=(.nx/version-plans/*.md)
          if [ ${#plans[@]} -eq 0 ]; then
            echo "No staged release plans were found in .nx/version-plans."
            exit 1
          fi

      - name: Dry-run release
        run: pnpm nx release --dry-run --skip-publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create release commit and tags
        run: pnpm nx release --skip-publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push release commit and tags
        run: git push origin HEAD:main --follow-tags

      - name: Publish packages to npm
        run: pnpm nx release publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
